version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crachasys_db
    environment:
      POSTGRES_USER: crachasys
      POSTGRES_PASSWORD: crachasys_secret
      POSTGRES_DB: crachasys
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crachasys_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@crachasys.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
